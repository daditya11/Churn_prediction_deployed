<!DOCTYPE html>
<html>
<head>
    <title>Customer Churn Prediction</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #1f4037, #99f2c8);
            padding: 30px;
        }

        .container {
            background: white;
            padding: 30px;
            max-width: 1000px;
            margin: auto;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #34495e;
        }

        select, input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 25px;
            padding: 14px;
            width: 100%;
            background-color: #27ae60;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .result {
            margin-top: 25px;
            padding: 15px;
            background: #ecf0f1;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>AI-Based Customer Churn Prediction System</h2>

    <form action="/predict" method="post">
        <div class="grid">

            <div class="field">
                <label>Gender</label>
                <select name="gender">
                    <option value="0">Female</option>
                    <option value="1">Male</option>
                </select>
            </div>

            <div class="field">
                <label>Senior Citizen</label>
                <select name="SeniorCitizen">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div class="field">
                <label>Has Partner</label>
                <select name="Partner">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div class="field">
                <label>Has Dependents</label>
                <select name="Dependents">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div class="field">
                <label>Tenure (Months)</label>
                <input type="number" name="tenure" required>
            </div>

            <div class="field">
                <label>Phone Service</label>
                <select name="PhoneService">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div class="field">
                <label>Multiple Lines</label>
                <select name="MultipleLines">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div class="field">
                <label>Internet Service</label>
                <select name="InternetService">
                    <option value="0">DSL</option>
                    <option value="1">Fiber Optic</option>
                    <option value="2">No Internet</option>
                </select>
            </div>

            <div class="field">
                <label>Online Security</label>
                <select name="OnlineSecurity">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div class="field">
                <label>Online Backup</label>
                <select name="OnlineBackup">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div class="field">
                <label>Device Protection</label>
                <select name="DeviceProtection">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div class="field">
                <label>Tech Support</label>
                <select name="TechSupport">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div class="field">
                <label>Streaming TV</label>
                <select name="StreamingTV">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div class="field">
                <label>Streaming Movies</label>
                <select name="StreamingMovies">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div class="field">
                <label>Contract Type</label>
                <select name="Contract">
                    <option value="0">Month-to-Month</option>
                    <option value="1">One Year</option>
                    <option value="2">Two Year</option>
                </select>
            </div>

            <div class="field">
                <label>Paperless Billing</label>
                <select name="PaperlessBilling">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div class="field">
                <label>Payment Method</label>
                <select name="PaymentMethod">
                    <option value="0">Bank Transfer</option>
                    <option value="1">Credit Card</option>
                    <option value="2">Electronic Check</option>
                    <option value="3">Mailed Check</option>
                </select>
            </div>

            <div class="field">
                <label>Monthly Charges</label>
                <input type="number" step="0.01" name="MonthlyCharges" required>
            </div>

            <div class="field">
                <label>Total Charges</label>
                <input type="number" step="0.01" name="TotalCharges" required>
            </div>

        </div>

        <button type="submit">Predict Churn</button>
    </form>

    {% if churn_status %}
<div class="result-box">
    <h2>Churn Prediction</h2>
    <p><strong>Churn:</strong> {{ churn_status }}</p>
    <p><strong>Risk Level:</strong> {{ risk_level }}</p>
</div>
{% endif %}


    {% if prediction_text %}
    <div class="result">
        <h3>{{ prediction_text }}</h3>
        <p><b>Churn Probability:</b> {{ churn_prob }}%</p>
        <p><b>Risk Level:</b> {{ risk_level }}</p>
    </div>
    {% endif %}
</div>

</body>
</html>
